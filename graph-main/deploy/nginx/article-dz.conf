server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    client_max_body_size 20M;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location /static/ {
        alias /var/www/article-dz/staticfiles/;
    }

    location /media/ {
        alias /var/www/article-dz/media/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/article-dz.sock;
    }
}
